<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>About · Label</title>
  <meta name="description" content="L Λ B E L IS DETAIL · SHAPE. BALANCE. PRECISION. About de LABEL en Villaviciosa de Odón." />
  <style>
    :root {
      --bg: #ececea;
      --text: #171816;
      --text-soft: #454743;
      --muted: #6a6c67;
      --line: rgba(23, 24, 22, 0.24);
    }

    * { box-sizing: border-box; }
    html {
      scroll-behavior: smooth;
      width: 100%;
      max-width: 100%;
      height: 100%;
      overflow-x: hidden;
    }

    body {
      margin: 0;
      width: 100%;
      max-width: 100%;
      min-width: 0;
      min-height: 100%;
      min-height: 100vh;
      overflow-x: hidden;
      color: var(--text);
      font-family: Inter, "Helvetica Neue", "Arial Nova", "Nimbus Sans", Arial, sans-serif;
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .about-page {
      min-height: 100vh;
      width: 100%;
      max-width: 100%;
      padding: clamp(1.2rem, 3vw, 2.4rem) clamp(1.2rem, 3vw, 2.4rem) clamp(1rem, 2.2vw, 1.8rem);
      display: flex;
      flex-direction: column;
      gap: clamp(1.2rem, 2.4vw, 2rem);
    }

    .top {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--line);
      padding-bottom: 0.85rem;
    }

    .top a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    .top a:hover { color: var(--text); }

    .manifesto {
      flex: 1;
      width: 100%;
      min-width: 0;
      display: grid;
      grid-template-columns: repeat(12, minmax(0, 1fr));
      column-gap: clamp(0.75rem, 2vw, 1.5rem);
      row-gap: clamp(1.45rem, 4.2vw, 3.35rem);
      align-content: center;
      padding-block: clamp(1.65rem, 6.5vw, 5rem);
    }

    .manifesto h1,
    .manifesto p {
      margin: 0;
      font-weight: 600;
      color: var(--text);
      text-wrap: balance;
      overflow-wrap: break-word;
      max-width: 100%;
    }

    .manifesto h1.m-brand {
      font-weight: inherit;
      color: inherit;
    }

    .m-brand {
      grid-column: 1 / 11;
      grid-row: 1;
      align-self: end;
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 0.55em 1.15em;
      padding-top: clamp(0.65rem, 2.4vw, 1.35rem);
      font-weight: inherit;
      line-height: 1.05;
    }

    .m-brand-word {
      font-size: clamp(1.45rem, 4.8vw, 3.1rem);
      font-weight: 750;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text);
    }

    .m-brand-detail {
      font-size: clamp(0.62rem, 1.12vw, 0.76rem);
      font-weight: 460;
      letter-spacing: 0.34em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .m-shape {
      grid-column: 1 / 10;
      grid-row: 2;
      font-size: clamp(2.75rem, 13.5vw, 9rem);
      line-height: 0.92;
      letter-spacing: -0.03em;
      font-weight: 700;
    }

    .m-balance {
      grid-column: 4 / 13;
      grid-row: 3;
      justify-self: end;
      text-align: right;
      font-size: clamp(2rem, 8.5vw, 5.75rem);
      line-height: 0.95;
      letter-spacing: -0.025em;
      font-weight: 700;
      padding-right: clamp(0rem, 2vw, 2rem);
    }

    .m-precision {
      grid-column: 1 / 11;
      grid-row: 4;
      font-size: clamp(2.5rem, 11.5vw, 8rem);
      line-height: 0.92;
      letter-spacing: -0.03em;
      font-weight: 700;
    }

    .m-quiet {
      grid-column: 2 / 12;
      grid-row: 5;
      justify-self: stretch;
      text-align: center;
      align-self: center;
      max-width: none;
      font-size: clamp(0.92rem, 2.05vw, 1.28rem);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-weight: 560;
      line-height: 1.38;
      color: var(--text-soft);
      padding-inline: clamp(0.25rem, 3vw, 2rem);
      padding-top: clamp(0.35rem, 1.4vw, 1rem);
    }

    .m-close {
      grid-column: 1 / 11;
      grid-row: 6;
      align-self: start;
      justify-self: start;
      font-size: clamp(1.55rem, 4.65vw, 3.35rem);
      letter-spacing: 0.075em;
      text-transform: uppercase;
      font-weight: 620;
      line-height: 1.12;
      padding-top: clamp(0.65rem, 2.2vw, 1.65rem);
    }

    .about-footer {
      width: 100%;
      border-top: 1px solid var(--line);
      padding-top: 0.95rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .about-links a {
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      font-size: 0.68rem;
      color: var(--muted);
      transition: color 0.2s ease;
    }

    .about-links a:hover { color: var(--text); }

    .socials {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .socials a {
      color: var(--muted);
      text-decoration: none;
      display: inline-flex;
      transition: color 0.2s ease, transform 0.2s ease;
    }

    .socials a:hover {
      color: var(--text);
      transform: translateY(-1px);
    }

    .socials svg {
      width: 18px;
      height: 18px;
    }

    @media (max-width: 980px) {
      .manifesto {
        grid-template-columns: repeat(6, minmax(0, 1fr));
        row-gap: clamp(1.35rem, 4.5vw, 2.75rem);
        padding-block: clamp(1.5rem, 6vw, 4rem);
      }

      .m-brand {
        grid-column: 1 / -1;
      }

      .m-shape {
        grid-column: 1 / -1;
      }

      .m-balance {
        grid-column: 2 / -1;
        padding-right: 0;
      }

      .m-precision {
        grid-column: 1 / -1;
      }

      .m-quiet {
        grid-column: 1 / -1;
        justify-self: stretch;
        text-align: center;
        max-width: none;
        font-size: clamp(0.82rem, 2.6vw, 1.08rem);
        letter-spacing: 0.11em;
      }

      .m-close {
        grid-column: 1 / -1;
      }
    }

    @media (max-width: 640px) {
      .about-page {
        padding: 1rem 1rem 0.9rem;
        gap: 1.2rem;
      }
      .top a {
        font-size: 0.64rem;
        letter-spacing: 0.18em;
      }

      .manifesto {
        grid-template-columns: repeat(4, minmax(0, 1fr));
        column-gap: 0.5rem;
        row-gap: clamp(1.15rem, 5vw, 2rem);
        padding-block: clamp(1rem, 5vw, 2.5rem);
      }

      .m-brand {
        grid-column: 1 / -1;
        flex-direction: column;
        align-items: flex-start;
        gap: 0.32rem;
        padding-top: 0.35rem;
      }

      .m-brand-word {
        font-size: clamp(1.55rem, 10vw, 2.35rem);
        letter-spacing: 0.12em;
      }

      .m-brand-detail {
        letter-spacing: 0.26em;
      }

      .m-shape {
        grid-column: 1 / -1;
        font-size: clamp(2.35rem, 18vw, 4.5rem);
      }

      .m-balance {
        grid-column: 1 / -1;
        justify-self: end;
        text-align: right;
        font-size: clamp(1.65rem, 11vw, 3.2rem);
        padding-right: 0;
      }

      .m-precision {
        grid-column: 1 / -1;
        font-size: clamp(2.1rem, 16vw, 4rem);
      }

      .m-quiet {
        grid-column: 1 / -1;
        font-size: clamp(0.78rem, 3.6vw, 0.98rem);
        letter-spacing: 0.1em;
        line-height: 1.42;
        padding-inline: 0;
      }

      .m-close {
        grid-column: 1 / -1;
        font-size: clamp(1.2rem, 5.5vw, 1.85rem);
        letter-spacing: 0.055em;
      }

      .about-footer {
        gap: 0.85rem;
      }
    }
  </style>
</head>

<body>
  <main class="about-page">
    <header class="top">
      <a href="index.html">LABEL</a>

      <p class="m-close">FORM WITH INTENTION</p>
