<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LABEL · Barber concept</title>
  <meta name="description" content="LABEL, barber concept en Villaviciosa de Odón, Madrid." />
  <style>
    :root {
      --bg: #ececea;
      --text: #171816;
      --text-soft: #454743;
      --muted: #6a6c67;
      --line: rgba(23, 24, 22, 0.26);
    }

    * { box-sizing: border-box; }
    html {
      scroll-behavior: smooth;
      width: 100%;
      max-width: 100%;
      height: 100%;
      overflow-x: hidden;
    }

    body {
      margin: 0;
      width: 100%;
      max-width: 100%;
      min-width: 0;
      min-height: 100%;
      min-height: 100vh;
      overflow-x: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, "Helvetica Neue", "Arial Nova", "Nimbus Sans", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .home {
      min-height: 100vh;
      width: 100%;
      max-width: 100%;
      padding: clamp(1.2rem, 3vw, 2.4rem);
      display: grid;
      grid-template-columns: repeat(12, minmax(0, 1fr));
      grid-template-rows: auto 1fr auto;
      gap: 1.2rem clamp(0.8rem, 2vw, 1.8rem);
    }

    .top-nav {
      grid-column: 1 / -1;
      display: flex;
      justify-content: flex-start;
      align-items: center;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .top-nav a {
      color: inherit;
      text-decoration: none;
      transition: color 0.2s ease;
    }

    .top-nav a:hover { color: var(--text); }

    .hero {
      grid-column: 1 / -1;
      width: 100%;
      display: grid;
      grid-template-columns: repeat(12, minmax(0, 1fr));
      align-items: end;
      gap: 1rem;
      padding-top: clamp(0.5rem, 3vw, 2.4rem);
    }

    .hero-copy {
      grid-column: 1 / 5;
      align-self: center;
      max-width: 18rem;
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }

    .hero-cta {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 0.7rem;
    }

    .brand {
      grid-column: 5 / 13;
      justify-self: end;
      width: min(100%, 54rem);
      max-width: 100%;
    }

    .brand img {
      width: 100%;
      height: auto;
      display: block;
    }

    .bottom {
      grid-column: 1 / -1;
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 1.2rem;
      flex-wrap: wrap;
      border-top: 1px solid var(--line);
      padding-top: 1.1rem;
    }

    .cta-group {
      display: flex;
      gap: 1.3rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .link-primary,
    .link-secondary {
      text-decoration: none;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-size: 0.72rem;
      color: var(--text);
      position: relative;
      padding-bottom: 0.2rem;
    }

    .link-primary {
      font-size: clamp(0.76rem, 0.85vw, 0.9rem);
      font-weight: 600;
      letter-spacing: 0.2em;
      color: var(--text);
    }

    .link-secondary {
      color: var(--text-soft);
      opacity: 0.92;
      font-weight: 500;
    }

    .link-primary::after,
    .link-secondary::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: 0;
      width: 100%;
      height: 1px;
      background: currentColor;
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.24s ease;
      opacity: 0.65;
    }

    .link-primary:hover::after,
    .link-secondary:hover::after,
    .link-primary:focus-visible::after,
    .link-secondary:focus-visible::after {
      transform: scaleX(1);
    }

    .link-primary:hover,
    .link-primary:focus-visible {
      color: #0e0f0d;
    }

    .socials {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .socials a {
      color: var(--muted);
      display: inline-flex;
      text-decoration: none;
      transition: color 0.2s ease, transform 0.2s ease;
    }

    .socials a:hover {
      color: var(--text);
      transform: translateY(-1px);
    }

    .socials svg { width: 18px; height: 18px; }

    @media (max-width: 900px) {
      .hero-copy { grid-column: 1 / 6; }
      .brand { grid-column: 6 / 13; }
    }

    @media (max-width: 760px) {
      .home {
        min-height: 100dvh;
        padding: 1rem;
        grid-template-rows: auto 1fr auto;
        gap: 1.1rem;
      }
      .top-nav {
        font-size: 0.64rem;
        letter-spacing: 0.18em;
      }
      .hero {
        grid-template-columns: 1fr;
        align-items: stretch;
        align-content: space-between;
        min-height: clamp(54vh, 60dvh, 68vh);
        gap: 0.8rem;
      }
      .hero-copy {
        grid-column: 1 / -1;
        order: 1;
        max-width: 16.5rem;
        align-self: start;
        margin-top: clamp(4rem, 20vw, 7rem);
      }
      .brand {
        grid-column: 1 / -1;
        order: 2;
        justify-self: end;
        align-self: end;
        width: min(78vw, 29rem);
      }
      .bottom {
        align-items: flex-start;
        gap: 1rem;
      }
      .cta-group {
        width: 100%;
        flex-direction: column;
        align-items: flex-start;
        gap: 0.9rem;
      }
      .link-primary {
        font-size: 0.8rem;
      }
      .link-secondary {
        font-size: 0.72rem;
      }
      .socials {
        width: 100%;
        justify-content: flex-start;
      }
    }
  </style>
</head>
<body>
  <main class="home">
    <nav class="top-nav" aria-label="Navegación principal">
      <a href="index.html">LABEL</a>
    </nav>

    <section class="hero" aria-label="Presentación">
      <div class="hero-copy">
        <div class="hero-cta">
          <a class="link-secondary" href="ubicacion.html">Ver concepto</a>
        </div>
      </div>

      <div class="brand">
        <img src="assets/logo.png" alt="LABEL" width="900" height="300" />
      </div>
    </section>

    <footer class="bottom">
      <div class="cta-group"></div>

      <nav class="socials" aria-label="Redes sociales">
        <a href="https://www.instagram.com/labelstudios.co/" target="_blank" rel="noopener noreferrer" aria-label="Instagram">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">

          </svg>
        </a>
      </nav>
    </footer>
  </main>
</body>
</html>
