<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reserva · LABEL</title>
  <meta name="description" content="Reserva tu cita en LABEL, barber concept en Villaviciosa de Odón." />
  <style>
    :root {
      --bg: #ececea;
      --text: #171816;
      --muted: #6b6d68;
      --line: rgba(23, 24, 22, 0.25);
    }

    * { box-sizing: border-box; }
    html {
      scroll-behavior: smooth;
      width: 100%;
      max-width: 100%;
      height: 100%;
      overflow-x: hidden;
    }

    body {
      margin: 0;
      width: 100%;
      max-width: 100%;
      min-width: 0;
      min-height: 100%;
      min-height: 100vh;
      overflow-x: hidden;
      color: var(--text);
      font-family: Inter, "Helvetica Neue", "Arial Nova", "Nimbus Sans", Arial, sans-serif;
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .page {
      min-height: 100vh;
      width: 100%;
      max-width: 100%;
      padding: clamp(1.2rem, 3vw, 2.4rem);
      display: flex;
      flex-direction: column;
      gap: clamp(1.6rem, 3.6vw, 2.6rem);
    }

    .top {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--line);
      padding-bottom: 0.8rem;
    }

    .logo-link {
      text-decoration: none;
      color: var(--muted);
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    .top-links {
      display: flex;
      gap: 1.1rem;
      align-items: center;
    }

    .top-links a {
      text-decoration: none;
      color: var(--muted);
      font-size: 0.68rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    .top-links a:hover { color: var(--text); }

    .layout {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr;
      gap: clamp(0.7rem, 1.4vw, 1rem);
      align-items: start;
    }

    .calendar {
      width: 100%;
      min-height: clamp(760px, 88vh, 980px);
      overflow: hidden;
    }

    .calendly-inline-widget {
      width: 100%;
      max-width: 100%;
      min-width: 0;
      height: clamp(760px, 88vh, 980px);
      background: transparent;
    }

    .socials {
      width: 100%;
      border-top: 1px solid var(--line);
      padding-top: 0.95rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .social-label {
      color: var(--muted);
      font-size: 0.66rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      text-decoration: none;
      transition: color 0.2s ease;
    }

    .social-label:hover { color: var(--text); }

    .social-icons {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .social-icons a {
      color: var(--muted);
      text-decoration: none;
      display: inline-flex;
      transition: color 0.2s ease, transform 0.2s ease;
    }

    .social-icons a:hover {
      color: var(--text);
      transform: translateY(-1px);
    }

    .social-icons svg { width: 18px; height: 18px; }

    @media (max-width: 960px) {
      .page {
        min-height: 100dvh;
        padding: 1rem;
        gap: 1.1rem;
      }
      .layout { gap: 0.75rem; }
      .calendar {
        min-height: clamp(700px, 80dvh, 920px);
      }
      .calendly-inline-widget {
        min-width: 0;
        height: clamp(700px, 80dvh, 920px);
      }
      .socials {
        padding-top: 0.7rem;
      }
    }

    @media (max-width: 640px) {
      .top {
        padding-bottom: 0.65rem;
      }
      .logo-link,
      .top-links a {
        font-size: 0.64rem;
        letter-spacing: 0.18em;
      }
      .top-links {
        gap: 0.75rem;
      }
      .calendar {
        min-height: clamp(620px, 76dvh, 840px);
      }
      .calendly-inline-widget {
        height: clamp(620px, 76dvh, 840px);
      }
      .social-label {
        font-size: 0.6rem;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="top">
      <a class="logo-link" href="index.html">Home</a>
      <nav class="top-links" aria-label="Enlaces">
        <a href="ubicacion.html">About</a>
      </nav>
    </header>

    <section class="layout" aria-label="Reserva">
      <div class="calendar">
        <div
          class="calendly-inline-widget"
          data-url="https://calendly.com/fernandoencinarv/new-meeting"
        ></div>
        <script type="text/javascript" src="https://assets.calendly.com/assets/external/widget.js" async></script>
      </div>
    </section>

    <nav class="socials" aria-label="Redes sociales">
      <a
        class="social-label"
        href="https://www.google.com/maps/search/?api=1&query=Calle+Bidasoa+5%2C+Villaviciosa+de+Od%C3%B3n%2C+Madrid"
        target="_blank"
        rel="noopener noreferrer"
      >
        Ubicación
      </a>
      <div class="social-icons">
        <a href="https://www.instagram.com/labelstudios.co/" target="_blank" rel="noopener noreferrer" aria-label="Instagram">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/>
          </svg>
        </a>
        <a href="https://www.tiktok.com/@labelstudios.co?is_from_webapp=1&sender_device=pc" target="_blank" rel="noopener noreferrer" aria-label="TikTok">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-5.2 1.74 2.89 2.89 0 0 1 2.31-4.64 2.93 2.93 0 0 1 .88.13V9.4a6.84 6.84 0 0 0-1-.05A6.33 6.33 0 0 0 5 20.1a6.34 6.34 0 0 0 10.86-4.43v-7a8.16 8.16 0 0 0 4.77 1.52v-3.4a4.85 4.85 0 0 1-1-.1z"/>
          </svg>
        </a>
      </div>
    </nav>
  </main>
</body>
</html>
